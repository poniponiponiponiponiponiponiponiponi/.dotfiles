[env]
TERM = "xterm-256color"

[font]
size = 9.0

[font.normal]
family = "JetBrainsMono Nerd Font"

[font.offset]
x = 0
y = 0

# https://github.com/alacritty/alacritty-theme/blob/master/themes/deep_space.toml
# Source https//github.com/tyrannicaltoucan/vim-deep-space

# Default colors
[colors.primary]
background = '#1b202a'
foreground = '#9aa7bd'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '#232936'
cursor = '#d33682'

# Normal colors
[colors.normal]
black = '#1b202a'
red = '#b15e7c'
green = '#709d6c'
yellow = '#b5a262'
blue = '#608cc3'
magenta = '#8f72bf'
cyan = '#56adb7'
white = '#9aa7bd'

# Bright colors
[colors.bright]
black = '#232936'
red = '#b3785d'
green = '#709d6c'
yellow = '#d5b875'
blue = '#608cc3'
magenta = '#c47ebd'
cyan = '#51617d'
white = '#9aa7bd'
